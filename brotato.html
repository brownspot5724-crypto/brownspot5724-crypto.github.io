<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BROTATO</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined');

    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background-color: #121212;
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      font-family: 'Roboto Mono', monospace;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 1rem 3rem;
      gap: 3rem;
      text-align: center;
    }

    nav {
      width: 100%;
      max-width: 1200px;
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
    }
    @media (min-width: 1024px) {
      nav {
        display: flex;
      }
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
      padding: 0;
      margin: 0;
      font-weight: 500;
      font-size: 1.125rem;
    }
    nav ul li a {
      color: white;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      padding-bottom: 0.15rem;
      transition: color 0.3s ease, border-bottom-color 0.3s ease;
    }
    nav ul li a:hover {
      color: #d1d5db;
    }
    nav ul li a.active,
    nav ul li a[aria-current="page"] {
      border-bottom-color: white;
    }
    nav .nav-right {
      padding: 0.5rem 1rem;
      background: white;
      color: black;
      border-radius: 0.375rem;
      text-transform: lowercase;
      font-weight: 700;
      box-shadow: 0 0 10px 1px #fff;
      text-decoration: none;
      transition: background-color 0.3s ease;
    }
    nav .nav-right:hover {
      background-color: #e5e7eb;
    }

    h1.fgbg1 {
      font-weight: 800;
      font-size: 2.5rem;
      margin: 0;
      user-select: none;
    }
    @media (min-width: 768px) {
      h1.fgbg1 {
        font-size: 3.5rem;
      }
    }

    .center-container {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      position: relative;
    }

    .back-button {
      position: absolute;
      top: -3.5rem;
      left: 0;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background-color: #5a5a5a;
      color: white;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      user-select: none;
      transition: background-color 0.3s ease;
      text-decoration: none;
      box-shadow: 0 0 6px #808080;
    }
    .back-button:hover,
    .back-button:focus {
      background-color: #808080;
      outline: none;
      box-shadow: 0 0 8px #808080;
    }
    .back-button .material-symbols-outlined {
      font-variation-settings:
        'FILL' 1,
        'wght' 600,
        'GRAD' 0,
        'opsz' 24;
      font-size: 1.3rem;
      line-height: 1;
    }

    iframe.frame {
      width: 100%;
      height: 500px;
      max-width: 900px;
      border: 3px solid #FFFFFF;
      border-radius: 8px;
      background: black;
      overflow: hidden;
      box-shadow:
        0 0 10px rgba(0, 170, 255, 0.5);
      transition: box-shadow 0.3s ease;
    }
    iframe.frame:focus {
      outline: none;
      box-shadow:
        0 0 15px 3px #FFFFFF;
    }

    #infodiv {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #eee;
      font-size: 1rem;
      user-select: none;
    }
    #fpscount {
      font-variant-numeric: tabular-nums;
    }
    .material-symbols-outlined {
      cursor: pointer;
      font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 24;
      font-size: 1.6rem;
      color: #FFFFFF;
      transition: color 0.3s ease;
    }
    .material-symbols-outlined:hover {
      color: #6fc3ff;
    }

    .gameinfo {
      width: 100%;
      max-width: 900px;
      background-color: #1e1e2f;
      padding: 1.5rem 2rem;
      border-radius: 8px;
      color: #ddd;
      box-shadow:
        inset 0 0 20px rgba(255, 255, 255, 0.05);
      font-size: 1rem;
      line-height: 1.5;
      user-select: text;
      text-align: left;
    }
    .gameinfoh2 {
      margin-top: 0;
      margin-bottom: 0.75rem;
      font-weight: 700;
      font-size: 1.25rem;
      color: #FFFFFF;
    }
    .gameinfotxt {
      margin: 0;
    }

    @media (max-width: 480px) {
      iframe.frame {
        height: 320px;
      }
      #infodiv {
        font-size: 0.9rem;
      }
      .gameinfo {
        font-size: 0.9rem;
        padding: 1rem 1.25rem;
      }
      .back-button {
        top: -3rem;
        font-size: 0.9rem;
        padding: 0.35rem 0.7rem;
      }
      .back-button .material-symbols-outlined {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <nav aria-label="Primary navigation">
    <ul>
      <li><a href="/" >Home</a></li>
      <li><a href="/games/index.html" class="active" aria-current="page">Games</a></li>
      <li><a href="/ai.html">Ai</a></li>
      <li><a href="/Contact.html">Contact</a></li>
    </ul>
    <a href="/index.html" class="nav-right">Home</a>
  </nav>

  <h1 class="fgbg1">BROTATO</h1>

  <div class="center-container">
    <a href="javascript:history.back()" class="back-button" aria-label="Go back">
      <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
      Back
    </a>

    <iframe 
      src="../gamesf/Brotato.html" 
      class="frame" 
      scrolling="no" 
      id="framedthingy"
      title="BROTATO Game Frame"
      onmouseover='document.getElementById("circle")?.style.setProperty("display", "none")'
      onmouseout='document.getElementById("circle")?.style.removeProperty("display")'
    ></iframe>

    <div id="infodiv" aria-live="polite" aria-atomic="true">
      <span id="fpscount">FPS: 0</span>
      <span 
        class="material-symbols-outlined" 
        role="button" 
        tabindex="0"
        onclick="openFullscreen();" 
        onkeypress="if(event.key==='Enter' || event.key===' ') openFullscreen();"
        title="Fullscreen"
        aria-label="Toggle fullscreen"
        >fullscreen</span>
    </div>

    <section class="gameinfo" aria-label="Game description">
      <h2 class="gameinfoh2">Description:</h2>
      <p class="gameinfotxt">
        A top-down arena shooter roguelite where you play as a potato wielding up to 6 weapons at once. Survive waves of enemies!
      </p>
    </section>
  </div>

  <script>
    const elem = document.getElementById("framedthingy");

    function openFullscreen() {
      if (!elem) return;
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
      } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
      }
    }

    const times = [];
    const fpscount = document.getElementById("fpscount");

    function refreshLoop() {
      window.requestAnimationFrame(() => {
        const now = performance.now();
        while (times.length > 0 && times[0] <= now - 1000) {
          times.shift();
        }
        times.push(now);
        const fps = times.length;
        fpscount.textContent = "FPS: " + fps;
        refreshLoop();
      });
    }

    refreshLoop();
    console.log(`Share SweetSweet With everyone!`, 
    'color: #ff6b6b; font-size: 14px; font-weight: bold; background: #2d3436; padding: 5px; border-radius: 3px;');
  </script>
</body>
</html>
